services:
  matchmaker:
    build:
      context: https://gittea.destinyend.com/Edge_lord/MatchLay.git
    container_name: udp-matchmaker
    restart: unless-stopped
    ports:
      - "8000:8000"      # HTTP API for matchmaking
      - "5555:5555/udp"  # Single UDP relay port
    environment:
     - SECRET_KEY=your-very-secret-key
     - PUBLIC_ADDR=your.server.ip.address
     - NORAY_UDP_RELAY_PORTS=5556-5560   # Example: one fixed port + a range
     - MATCH_TIMEOUT_SECONDS=60
     - HTTP_PORT=8000
