services:
  matchmaker:
    build:
      context: https://gittea.destinyend.com/Edge_lord/MatchLay.git
    container_name: udp-matchmaker
    restart: unless-stopped
    ports:
      - "8000:8000"      # HTTP API for matchmaking
      - "5555:5555/udp"  # Single UDP relay port
    environment:
      - PUBLIC_ADDR=YOUR_PUBLIC_IP       # <-- SET YOUR SERVER'S IP/DOMAIN
      - SECRET_KEY=YOUR_SECRET_KEY       # <-- SET A STRONG UNIQUE SECRET
      - RELAY_UDP_PORT=5555
      - MATCH_TIMEOUT_SECONDS=60
